# Kanagawa Lotus (light)
# Palette mirrors the dark file structure but with Lotus colors:
#   bg0 #f2ecbc  bg1 #dcd5ac  fg #545464  comment #8a8980
#   blue #4d699b  selection #b5cbd2  accent #cc6d00
set -g status-style "bg=#f2ecbc,fg=#545464"

set -g status-left "#[fg=#f2ecbc,bg=#4d699b,bold] #S #[fg=#4d699b,bg=#f2ecbc] "
set -g status-right "#[fg=#dcd5ac,bg=#f2ecbc]#[fg=#545464,bg=#dcd5ac] %Y-%m-%d #[fg=#4d699b,bg=#dcd5ac]#[fg=#f2ecbc,bg=#4d699b,bold] %H:%M "

set -g window-status-format "#[fg=#8a8980,bg=#f2ecbc] #I:#W "
set -g window-status-current-format "#[fg=#f2ecbc,bg=#cc6d00]#[fg=#f2ecbc,bg=#cc6d00,bold] #I:#W #[fg=#cc6d00,bg=#f2ecbc]"

set -g pane-border-style "fg=#dcd5ac"
set -g pane-active-border-style "fg=#4d699b"

set -g message-style "bg=#dcd5ac,fg=#545464"
set -g message-command-style "bg=#dcd5ac,fg=#545464"
set -g mode-style "bg=#b5cbd2,fg=#545464"
