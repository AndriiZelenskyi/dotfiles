# Kanagawa Wave (dark)
set -g status-style "bg=#1F1F28,fg=#DCD7BA"

set -g status-left "#[fg=#1F1F28,bg=#7E9CD8,bold] #S #[fg=#7E9CD8,bg=#1F1F28] "
set -g status-right "#[fg=#2A2A37,bg=#1F1F28]#[fg=#DCD7BA,bg=#2A2A37] %Y-%m-%d #[fg=#7E9CD8,bg=#2A2A37]#[fg=#1F1F28,bg=#7E9CD8,bold] %H:%M "

set -g window-status-format "#[fg=#727169,bg=#1F1F28] #I:#W "
set -g window-status-current-format "#[fg=#1F1F28,bg=#DCA561]#[fg=#1F1F28,bg=#DCA561,bold] #I:#W #[fg=#DCA561,bg=#1F1F28]"

set -g pane-border-style "fg=#2A2A37"
set -g pane-active-border-style "fg=#7E9CD8"

set -g message-style "bg=#2A2A37,fg=#DCD7BA"
set -g message-command-style "bg=#2A2A37,fg=#DCD7BA"
set -g mode-style "bg=#2D4F67,fg=#DCD7BA"
