# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Theme (Kanagawa Wave/Lotus, auto-switched by tmux-theme-switcher launchd agent).
# active-theme.conf is a symlink maintained by the agent; fall back to wave if missing.
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-separator ""

if-shell '[ -L "$HOME/.config/tmux/active-theme.conf" ] || [ -f "$HOME/.config/tmux/active-theme.conf" ]' \
    'source-file "$HOME/.config/tmux/active-theme.conf"' \
    'source-file "$HOME/.config/tmux/themes/kanagawa-wave.conf"'

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1

set-window-option -g mode-keys vi

bind -r v split-window -v
bind -r s split-window -h
bind -r l list-sessions

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with hjkl
bind -r H resize-pane -L 25
bind -r J resize-pane -D 25
bind -r K resize-pane -U 25
bind -r L resize-pane -R 25


bind r source-file ~/.tmux.conf

# Claude related settings
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
