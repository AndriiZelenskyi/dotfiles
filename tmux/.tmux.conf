# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Kanagawa Wave theme
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1F1F28,fg=#DCD7BA"
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=#1F1F28,bg=#7E9CD8,bold] #S #[fg=#7E9CD8,bg=#1F1F28] "
set -g status-right "#[fg=#2A2A37,bg=#1F1F28]#[fg=#DCD7BA,bg=#2A2A37] %Y-%m-%d #[fg=#7E9CD8,bg=#2A2A37]#[fg=#1F1F28,bg=#7E9CD8,bold] %H:%M "

set -g window-status-separator ""
set -g window-status-format "#[fg=#727169,bg=#1F1F28] #I:#W "
set -g window-status-current-format "#[fg=#1F1F28,bg=#DCA561]#[fg=#1F1F28,bg=#DCA561,bold] #I:#W #[fg=#DCA561,bg=#1F1F28]"

set -g pane-border-style "fg=#2A2A37"
set -g pane-active-border-style "fg=#7E9CD8"

set -g message-style "bg=#2A2A37,fg=#DCD7BA"
set -g message-command-style "bg=#2A2A37,fg=#DCD7BA"
set -g mode-style "bg=#2D4F67,fg=#DCD7BA"

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1

set-window-option -g mode-keys vi

bind -r v split-window -v
bind -r s split-window -h
bind -r l list-sessions

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with hjkl
bind -r H resize-pane -L 25
bind -r J resize-pane -D 25
bind -r K resize-pane -U 25
bind -r L resize-pane -R 25


bind r source-file ~/.tmux.conf

# Claude related settings
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
